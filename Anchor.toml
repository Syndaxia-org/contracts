[features]
resolution = true
skip-lint = false

[programs.localnet]
syndaxia_core = "Hj3Zs6F1SBPwHKyvkQDZT5JeZuYHu7FBD3smcnFEDyRp"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# The treasury program is compiled in its own workspace (../syndaxia-treasury).
# Run `cd ../syndaxia-treasury && anchor build` before running these tests.
# The built .so is loaded into the local test validator at startup so the core
# program can read the TreasuryConfig PDA — without importing treasury source.
[[test.genesis]]
address = "D8H3JetPqdFasLXGbAqjhrrArfoYmy8PwQtt8KehZLxd"
program = "../syndaxia-treasury/target/deploy/syndaxia_treasury.so"
