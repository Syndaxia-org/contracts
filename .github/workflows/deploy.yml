name: Syndaxia – Build, Test & Deploy

on:
  # develop: trigger immediately (CI image doesn't change on develop pushes)
  push:
    branches: [develop]
  pull_request:
    branches: [main]
  # main: wait for the CI image to be built/pushed before running.
  # This avoids the race condition where deploy pulls a stale :latest image.
  workflow_run:
    workflows: ["Build CI Anchor Image"]
    types: [completed]
    branches: [main]

env:
  ANCHOR_VERSION: "0.32.1"
  SOLANA_VERSION: "3.1.13"
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & Test (runs on every push/PR)
  # ─────────────────────────────────────────────
  build-and-test:
    # When triggered via workflow_run, only proceed if the image build succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/syndaxia-org/ci-anchor:latest
    steps:
      - name: Checkout syndaxia-core
        uses: actions/checkout@v4

      - name: Checkout syndaxia-treasury
        uses: actions/checkout@v4
        with:
          repository: Syndaxia-org/syndaxia-treasury
          path: syndaxia-treasury
          token: ${{ secrets.CI_TREASURY_PAT }}

      - name: Remove incompatible treasury lockfile (v4)
        run: rm -f syndaxia-treasury/Cargo.lock

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            syndaxia-treasury/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check toolchain versions
        run: |
          rustc --version
          cargo --version
          solana --version
          anchor --version
          node --version
          npm --version

      - name: Ensure Solana SBF tools are on PATH
        run: |
          echo "/root/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          cargo --list | grep -q "build-sbf"

      - name: Install JS dependencies
        run: npm ci

      # Anchor needs a default keypair to launch the local test validator.
      # This is a throwaway key — never funded, discarded after the job.
      - name: Generate throwaway keypair for local test validator
        run: solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      # Build treasury first (its .so is needed for core's test validator)
      - name: Build syndaxia-treasury
        run: |
          cd syndaxia-treasury
          rm -f Cargo.lock
          anchor build
          # Copy treasury .so into core's target so Anchor.toml [programs.localnet] resolves
          mkdir -p ../target/deploy
          cp target/deploy/syndaxia_treasury.so ../target/deploy/
          cp target/deploy/syndaxia_treasury-keypair.json ../target/deploy/ 2>/dev/null || true

      - name: Build syndaxia-core (BPF)
        run: anchor build

      - name: Start local test validator
        run: |
          LEDGER_DIR=".anchor/test-ledger"
          STATE_DIR=".anchor/validator-state"
          LOG_FILE="$STATE_DIR/test-ledger-log.txt"
          PID_FILE="$STATE_DIR/validator.pid"

          mkdir -p "$LEDGER_DIR"
          mkdir -p "$STATE_DIR"
          : > "$LOG_FILE"

          if ! command -v solana-test-validator >/dev/null 2>&1; then
            echo "solana-test-validator not found in PATH" | tee -a "$LOG_FILE"
            exit 1
          fi

          solana config set --url http://127.0.0.1:8899
          MINT_PUBKEY=$(solana address -k ~/.config/solana/id.json)
          solana-test-validator \
            --reset \
            --ledger "$LEDGER_DIR" \
            --mint "$MINT_PUBKEY" \
            --bpf-program FnzdhUJf3YKmQhSWVQD3Qr9jKu4DjnWEMWiNypX43f1x target/deploy/syndaxia_core.so \
            --bpf-program D8H3JetPqdFasLXGbAqjhrrArfoYmy8PwQtt8KehZLxd target/deploy/syndaxia_treasury.so \
            > "$LOG_FILE" 2>&1 &
          echo $! > "$PID_FILE"

          # Fail fast if the validator crashes immediately.
          sleep 2
          if ! kill -0 "$(cat "$PID_FILE")" 2>/dev/null; then
            echo "Validator exited early" | tee -a "$LOG_FILE"
            tail -n 200 "$LOG_FILE" || true
            exit 1
          fi

          # Wait until RPC is ready before running tests.
          for i in $(seq 1 180); do
            if solana block-height >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$(cat "$PID_FILE")" 2>/dev/null; then
              echo "Validator exited before RPC became ready" | tee -a "$LOG_FILE"
              tail -n 200 "$LOG_FILE" || true
              exit 1
            fi
            sleep 1
          done

          if ! solana block-height >/dev/null 2>&1; then
            echo "Validator did not become ready in time" | tee -a "$LOG_FILE"
            tail -n 200 "$LOG_FILE" || true
            exit 1
          fi

          echo "Validator is ready"

      - name: Run tests (reuse running validator)
        run: anchor test --skip-build --skip-deploy --skip-local-validator

      - name: Stop local test validator
        if: always()
        run: |
          if [ -f .anchor/validator-state/validator.pid ]; then
            kill "$(cat .anchor/validator-state/validator.pid)" 2>/dev/null || true
          fi

      - name: Upload test-ledger log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-ledger-log
          path: .anchor/validator-state/test-ledger-log.txt
          if-no-files-found: ignore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-builds
          path: |
            target/deploy/syndaxia_core.so
            target/deploy/syndaxia_treasury.so
          retention-days: 7

      - name: Compute build checksums
        run: |
          sha256sum target/deploy/syndaxia_core.so
          sha256sum target/deploy/syndaxia_treasury.so

  # ─────────────────────────────────────────────
  # 2. Deploy to Devnet (on push to develop)
  # ─────────────────────────────────────────────
  deploy-devnet:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/syndaxia-org/ci-anchor:latest
    environment: devnet
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-builds
          path: target/deploy/

      - name: Configure Solana for devnet
        run: |
          solana config set --url "${{ secrets.SOLANA_RPC_URL }}"
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json

      - name: Write program keypairs
        run: |
          echo '${{ secrets.PROGRAM_KEYPAIR_TREASURY }}' > /tmp/treasury-keypair.json
          echo '${{ secrets.PROGRAM_KEYPAIR_CORE }}' > /tmp/core-keypair.json

      - name: Deploy Treasury (upgradeable)
        run: |
          solana program deploy \
            --program-id /tmp/treasury-keypair.json \
            --keypair /tmp/deployer.json \
            target/deploy/syndaxia_treasury.so

      - name: Deploy Core (final → immutable)
        run: |
          # Deploy first
          solana program deploy \
            --program-id /tmp/core-keypair.json \
            --keypair /tmp/deployer.json \
            target/deploy/syndaxia_core.so

          # Revoke upgrade authority → IMMUTABLE
          # ⚠️  Uncomment only when you're 100% sure
          # solana program set-upgrade-authority \
          #   $(solana address -k /tmp/core-keypair.json) \
          #   --final

      - name: Verify deployment
        run: |
          echo "=== Core Program ==="
          solana program show $(solana address -k /tmp/core-keypair.json)
          echo "=== Treasury Program ==="
          solana program show $(solana address -k /tmp/treasury-keypair.json)

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/deployer.json /tmp/core-keypair.json /tmp/treasury-keypair.json

  # ─────────────────────────────────────────────
  # 3. Deploy to Mainnet (manual trigger, protected)
  # ─────────────────────────────────────────────
  deploy-mainnet:
    needs: build-and-test
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/syndaxia-org/ci-anchor:latest
    environment: mainnet-production  # ← Requires manual approval
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-builds
          path: target/deploy/

      - name: Configure Solana for mainnet
        run: |
          solana config set --url ${{ secrets.SOLANA_RPC_URL }}
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json

      - name: Write program keypairs
        run: |
          echo '${{ secrets.PROGRAM_KEYPAIR_TREASURY }}' > /tmp/treasury-keypair.json
          echo '${{ secrets.PROGRAM_KEYPAIR_CORE }}' > /tmp/core-keypair.json

      - name: Check deployer balance
        run: |
          BALANCE=$(solana balance /tmp/deployer.json | awk '{print $1}')
          echo "Deployer balance: $BALANCE SOL"
          # Fail if less than 3 SOL
          python3 -c "import sys; b=float('$BALANCE'); assert b >= 3.0, f'Insufficient balance: {b} SOL'"

      - name: Deploy Treasury
        run: |
          solana program deploy \
            --program-id /tmp/treasury-keypair.json \
            --keypair /tmp/deployer.json \
            target/deploy/syndaxia_treasury.so

      - name: Transfer Treasury authority to Squads multisig
        run: |
          # Transfer upgrade authority to Squads multisig vault
          solana program set-upgrade-authority \
            $(solana address -k /tmp/treasury-keypair.json) \
            --new-upgrade-authority ${{ secrets.SQUADS_MULTISIG_VAULT }}

      - name: Deploy Core (upgradeable initially)
        run: |
          solana program deploy \
            --program-id /tmp/core-keypair.json \
            --keypair /tmp/deployer.json \
            target/deploy/syndaxia_core.so

          # Transfer Core upgrade authority to Squads multisig
          # This keeps the program upgradeable but only via N/M multisig approval
          solana program set-upgrade-authority \
            $(solana address -k /tmp/core-keypair.json) \
            --new-upgrade-authority ${{ secrets.SQUADS_MULTISIG_VAULT }}

      - name: Verify deployments
        run: |
          echo "=== Core Program (should show: Squads vault as authority) ==="
          solana program show $(solana address -k /tmp/core-keypair.json)
          echo "=== Treasury Program (should show: Squads vault as authority) ==="
          solana program show $(solana address -k /tmp/treasury-keypair.json)

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/deployer.json /tmp/core-keypair.json /tmp/treasury-keypair.json
