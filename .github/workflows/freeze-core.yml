name: Syndaxia – Freeze Core (Immutable)

# Manual trigger only — this is IRREVERSIBLE
on:
  workflow_dispatch:
    inputs:
      confirm_program_id:
        description: "Type the Core program ID to confirm (e.g. FnzdhUJf3Y...)"
        required: true
      confirm_irreversible:
        description: "Type FREEZE to confirm this is irreversible"
        required: true

env:
  SOLANA_VERSION: "1.18.26"

jobs:
  freeze-core:
    runs-on: ubuntu-latest
    environment: mainnet-production  # Requires manual approval from reviewers
    steps:
      - name: Validate confirmation inputs
        run: |
          if [[ "${{ inputs.confirm_irreversible }}" != "FREEZE" ]]; then
            echo "❌ You must type FREEZE to confirm. Aborting."
            exit 1
          fi
          echo "✅ Confirmation accepted. Proceeding to make Core IMMUTABLE."

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Configure Solana
        run: |
          solana config set --url "${{ secrets.SOLANA_RPC_URL }}"
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json

      - name: Show current Core program state
        run: |
          echo '${{ secrets.PROGRAM_KEYPAIR_CORE }}' > /tmp/core-keypair.json
          PROGRAM_ID=$(solana address -k /tmp/core-keypair.json)
          echo "Program ID: $PROGRAM_ID"

          # Verify the input matches
          if [[ "$PROGRAM_ID" != "${{ inputs.confirm_program_id }}"* ]]; then
            echo "❌ Program ID mismatch! Input: ${{ inputs.confirm_program_id }}, Actual: $PROGRAM_ID"
            exit 1
          fi

          echo "=== Current state ==="
          solana program show "$PROGRAM_ID"

      - name: Freeze Core — IRREVERSIBLE
        run: |
          PROGRAM_ID=$(solana address -k /tmp/core-keypair.json)
          echo "🔒 Making $PROGRAM_ID IMMUTABLE..."

          # NOTE: This requires the current upgrade authority to sign.
          # If authority is a Squads multisig, this step must be done
          # through the Squads UI instead. In that case, this workflow
          # serves as the audit trail / approval gate only.
          solana program set-upgrade-authority "$PROGRAM_ID" --final

          echo "✅ Core is now IMMUTABLE. No further upgrades possible."

      - name: Verify immutability
        run: |
          PROGRAM_ID=$(solana address -k /tmp/core-keypair.json)
          echo "=== Final state (authority should be 'none') ==="
          solana program show "$PROGRAM_ID"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/deployer.json /tmp/core-keypair.json
