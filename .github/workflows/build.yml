name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  ANCHOR_VERSION: "0.32.1"
  SOLANA_VERSION: "3.1.13"
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "20"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: solana

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor avm --locked --force && avm install ${{ env.ANCHOR_VERSION }} && avm use ${{ env.ANCHOR_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: solana/package-lock.json

      - name: Install Node dependencies
        working-directory: solana
        run: npm ci

      - name: Generate Solana keypair
        run: solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Build programs
        working-directory: solana
        run: |
          rm -rf target/idl target/types
          anchor build
          # Treasury is a private repo — copy committed IDL fixture
          cp tests/fixtures/syndaxia_treasury.json target/idl/syndaxia_treasury.json

      - name: Run tests
        working-directory: solana
        run: anchor test
