name: Build & Test

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']    # push d'un tag git → verifiable build + création de la release
  pull_request:
    branches: [main, develop]

env:
  ANCHOR_VERSION: "0.32.1"
  SOLANA_VERSION: "3.1.11"   # ships platform-tools v1.53 (rustc 1.89) — required for anchor 0.32 / solana-program 2.3 (edition2024)
  RUST_VERSION: "stable"    # anchor-syn 0.32.1 needs proc_macro::Span::local_file() stabilized in 1.88

jobs:
  # ───────────────────────────────────────────────────────────────────
  # 1. Build & Test
  # ───────────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # anchor-syn 0.32.1 requires proc_macro::Span::local_file() → stabilized in Rust 1.88.0
      # edition2024 (hashbrown 0.17) requires Cargo >= 1.85 → stable satisfies both
      - name: Install Rust stable (≥1.88 required by anchor-syn 0.32)
        uses: dtolnay/rust-toolchain@stable

      # Force ~/.cargo/bin ahead of preinstalled cargo 1.84 on GH runners
      - name: Force rustup proxy in PATH + verify versions
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "--- which ---"
          which cargo && which rustc
          echo "--- versions ---"
          rustc --version && cargo --version

      - name: Cache Cargo bin (avm / anchor)
        id: cache-cargo-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.avm
          key: cargo-bin-avm-anchor-${{ env.ANCHOR_VERSION }}-rust185-${{ runner.os }}

      # Cache registry + build artefacts separately (changes with Cargo.lock)
      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            solana/target/
          key: ${{ runner.os }}-cargo-rust185-${{ hashFiles('solana/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust185-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI (via avm)
        if: steps.cache-cargo-bin.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Ensure anchor on PATH (cache hit path)
        run: |
          avm use ${{ env.ANCHOR_VERSION }}
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: solana/package-lock.json

      - name: Install JS dependencies
        working-directory: solana
        run: npm ci

      - name: Generate throwaway keypair
        run: solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Build programs (core + treasury)
        working-directory: solana
        run: |
          rm -rf target/idl target/types
          anchor build

      - name: Print checksums
        working-directory: solana
        run: |
          sha256sum target/deploy/syndaxia_core.so
          sha256sum target/deploy/syndaxia_treasury.so

      - name: Run tests
        working-directory: solana
        run: anchor test --skip-build

      - name: Stage IDL files for upload
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p idl-staging
          cp solana/target/idl/syndaxia_core.json    idl-staging/
          cp solana/target/idl/syndaxia_treasury.json idl-staging/

        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: idl-files
          retention-days: 1
          path: idl-staging/

  # ───────────────────────────────────────────────────────────────────
  # 2. Verifiable build + release artifacts  (uniquement sur tag vX.Y.Z)
  # ───────────────────────────────────────────────────────────────────
  solana-verify:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write   # required to create the release + upload assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (≥1.88 required by anchor-syn 0.32)
        uses: dtolnay/rust-toolchain@stable

      - name: Force rustup proxy in PATH
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version

      - name: Cache Cargo bin (solana-verify)
        id: cache-sv-bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-solana-verify-stable-${{ runner.os }}

      - name: Install solana-verify CLI
        if: steps.cache-sv-bin.outputs.cache-hit != 'true'
        run: cargo install solana-verify --locked

      - name: Download IDL artifacts
        uses: actions/download-artifact@v4
        with:
          name: idl-files
          path: idl-download

      # core: --features mainnet active le TREASURY_PROGRAM_ID mainnet réel
      - name: Verifiable build — syndaxia-core (mainnet)
        working-directory: solana
        run: |
          solana-verify build --library-name syndaxia_core \
            -b solanafoundation/solana-verifiable-build:3.1.10 \
            -- --features mainnet

      # treasury: pas de feature mainnet, même binaire pour tous les envs
      - name: Verifiable build — syndaxia-treasury
        working-directory: solana
        run: |
          solana-verify build --library-name syndaxia_treasury \
            -b solanafoundation/solana-verifiable-build:3.1.10

      - name: Print verifiable checksums (mainnet deployment artifacts)
        working-directory: solana
        run: |
          echo "=== syndaxia-core (mainnet) ==="
          sha256sum target/deploy/syndaxia_core.so
          echo "=== syndaxia-treasury ==="
          sha256sum target/deploy/syndaxia_treasury.so

      - name: Create GitHub Release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          cp solana/target/deploy/syndaxia_core.so       syndaxia_core-${TAG}.so
          cp solana/target/deploy/syndaxia_treasury.so   syndaxia_treasury-${TAG}.so
          cp idl-download/syndaxia_core.json             syndaxia_core-${TAG}.idl.json
          cp idl-download/syndaxia_treasury.json         syndaxia_treasury-${TAG}.idl.json
          sha256sum syndaxia_core-${TAG}.so syndaxia_treasury-${TAG}.so > SHA256SUMS-${TAG}.txt
          gh release create ${TAG} \
            --title "Release ${TAG}" \
            --notes "Verifiable mainnet build — checksums dans SHA256SUMS-${TAG}.txt" \
            syndaxia_core-${TAG}.so \
            syndaxia_treasury-${TAG}.so \
            syndaxia_core-${TAG}.idl.json \
            syndaxia_treasury-${TAG}.idl.json \
            SHA256SUMS-${TAG}.txt
