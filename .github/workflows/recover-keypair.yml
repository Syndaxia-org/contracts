name: Recover upgrade-authority keypair (TEMP — DELETE AFTER USE)

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: mainnet-production
    steps:
      - name: Write keypair to file
        run: |
          echo '${{ secrets.UPGRADE_AUTHORITY_KEYPAIR }}' > upgrade-authority.json
          # Verify it's valid JSON with an address
          cat upgrade-authority.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Length: {len(d)}')"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-authority-keypair
          path: upgrade-authority.json
          retention-days: 1
